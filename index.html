<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sapo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="scene scene--sunny">
    <div class="sky-glow"></div>
    <div class="sun"></div>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>

    <div class="lake">
      <div class="water water-1"></div>
      <div class="water water-2"></div>
      <div class="water water-3"></div>
    </div>

    <div class="lilypad"></div>

    <section class="frog-area" aria-label="Sapo no nenúfar">
      <div class="tongue" id="tongue"></div>

      <div class="frog-wrap" id="frogWrap">
        <img src="frog.jpg" alt="Sapo" class="frog-photo" />

        <div class="frog-eye frog-eye--visible" id="frogEyeVisible">
          <span class="iris"></span>
          <span class="blink blink-top"></span>
          <span class="blink blink-bottom"></span>
        </div>

        <div class="frog-eye frog-eye--far" id="frogEyeFar">
          <span class="iris"></span>
          <span class="blink blink-top"></span>
          <span class="blink blink-bottom"></span>
        </div>
      </div>
    </section>

    <img src="fly.jpg" alt="Mosca" class="fly" id="fly" />
  </main>

  <script src="script.js"></script>
</body>
</html>
