<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sapo</title>
  <link rel="stylesheet" href="style.css?v=10" />
</head>
<body>
  <main class="scene weather-clear day" id="scene">
    <div class="sky" id="sky"></div>
    <div class="sun-moon" id="sunMoon"></div>
    <div class="clouds" id="clouds">
      <span class="cloud cloud-a"></span>
      <span class="cloud cloud-b"></span>
      <span class="cloud cloud-c"></span>
    </div>

    <div class="weather-fog-layer" id="fogLayer">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="weather-rain-layer" id="rainLayer"></div>

    <img src="pond_with_frog.png?v=10" alt="Lago com sapo" class="pond-scene" id="pondScene" />
  </main>

  <script src="script.js?v=10"></script>
</body>
</html>
